on: push
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.26.1'
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '24.x'
      - name: Doctor
        run: wails doctor
      - name: Build
        run: wails build
